services:
  whatsapp-transcription:
    build: .
    image: whatsapptranscription_image
    container_name: whatsapptranscription_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      # Dati di sessione WhatsApp
      - ./Volumes/session_data:/app/session_data
      # Cache dei modelli Hugging Face
      - ./Volumes/cache:/root/.cache
      # Configurazioni e cache di Chrome (inclusi crash report)
      - ./Volumes/root_config:/root/.config
      # Cache di sistema (font, etc.)
      - ./Volumes/var_cache:/var/cache
      # Log di sistema
      - ./Volumes/var_log:/var/log
      # File temporanei persistenti
      - ./Volumes/var_tmp:/var/tmp
      # Timezone
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    environment:
      - GROUPS=${GROUPS:-*}
      - PATH_AUDIO=${PATH_AUDIO:-.}
      - TZ=${TZ:-Europe/Rome}
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"