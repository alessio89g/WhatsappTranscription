services:
  whatsapp-transcription:
    build: .
    image: whatsapptranscription_image
    container_name: whatsapptranscription_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - ./Volumes/session_data:/app/session_data
      - ./Volumes/cache:/root/.cache
      - ./Volumes/root_config:/root/.config
      - ./Volumes/var_cache:/var/cache
      - ./Volumes/var_log:/var/log
      - ./Volumes/var_tmp:/var/tmp
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    env_file:
      - .env
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
